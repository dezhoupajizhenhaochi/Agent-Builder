<div class="primary-color-popover" id="primary-color-popover">
  <div class="primary-color-popover-head">
    <span>主色精调 · OKLCH</span>
    <button class="primary-color-popover-close" id="primary-color-popover-close" type="button">×</button>
  </div>
  <div class="primary-color-plane" id="primary-color-plane">
    <span class="primary-color-plane-dot" id="primary-color-plane-dot"></span>
  </div>
  <div class="oklch-sliders">
    <div class="oklch-row">
      <div class="oklch-row-head">
        <span class="oklch-label">L <span class="oklch-label-detail">明度</span></span>
        <input type="number" class="oklch-num" id="lch-l-num" min="0" max="1" step="0.001" value="0.577">
      </div>
      <input type="range" class="oklch-slider lch-slider-l" id="lch-l" min="0" max="1" step="0.001" value="0.577">
    </div>
    <div class="oklch-row">
      <div class="oklch-row-head">
        <span class="oklch-label">C <span class="oklch-label-detail">色度</span></span>
        <input type="number" class="oklch-num" id="lch-c-num" min="0" max="0.4" step="0.001" value="0.1002">
      </div>
      <input type="range" class="oklch-slider lch-slider-c" id="lch-c" min="0" max="0.4" step="0.001" value="0.1002">
    </div>
    <div class="oklch-row">
      <div class="oklch-row-head">
        <span class="oklch-label">H <span class="oklch-label-detail">色相</span></span>
        <input type="number" class="oklch-num" id="lch-h-num" min="0" max="360" step="1" value="150">
      </div>
      <input type="range" class="oklch-slider lch-slider-h" id="lch-h" min="0" max="360" step="0.1" value="149.9">
    </div>
  </div>
  <div class="oklch-hint">算法会以此色为 600 档锚点，向上下两端展开生成 11 级色阶。</div>
</div>
